<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <rect width="256" height="256" rx="32" fill="#1a73e8"/>
  <g fill="white" transform="translate(128,128)">
    <!-- House shape -->
    <polygon points="0,-70 -70,0 70,0" fill="none" stroke="white" stroke-width="6"/>
    <rect x="-40" y="0" width="80" height="60" rx="4" fill="none" stroke="white" stroke-width="5"/>
    <!-- Antenna -->
    <line x1="0" y1="-70" x2="0" y2="-85" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <circle cx="0" cy="-90" r="5" fill="white"/>
    <!-- Signal waves -->
    <path d="M-20,-78 Q-30,-68 -20,-58" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <path d="M20,-78 Q30,-68 20,-58" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <!-- Door -->
    <rect x="-12" y="20" width="24" height="40" rx="12" fill="white" opacity="0.8"/>
    <!-- Bulb inside -->
    <circle cx="0" cy="-8" r="8" fill="#FFD700"/>
    <path d="M-5,0 L5,0 L4,6 L-4,6 Z" fill="#FFD700"/>
  </g>
</svg>
